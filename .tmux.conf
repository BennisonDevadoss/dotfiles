##### TERMINAL #####
# default-terminal: tells tmux what kind of terminal to emulate (256 colors)
# terminal-overrides: disables alternate screen (so output stays visible after commands)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:smcup@:rmcup@'
set -g mouse on

# mode-keys vi: makes copy mode use vim keybindings instead of emacs
setw -g mode-keys vi

# focus-events: lets vim know when you switch panes (triggers vim's autoread)
set -g focus-events on

# escape-time 0: removes delay after pressing Escape (critical for vim — without this, Escape feels laggy)
set -sg escape-time 0

# history-limit: how many lines tmux remembers in scrollback buffer
set -g history-limit 50000

# aggressive-resize: resizes window to smallest active client, not smallest ever connected
setw -g aggressive-resize on

# base-index 1: windows and panes start at 1 instead of 0 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# renumber-windows: auto-renumbers windows when one is closed (no gaps like 1,3,4)
set -g renumber-windows on

##### PREFIX #####
# prefix is the "leader key" of tmux — like <leader> in vim
# C-Space means Ctrl+Space — you press this before any tmux command
# unbind C-b: removes the default prefix (C-b) so it doesn't interfere
unbind C-b
set -g prefix C-Space
# send-prefix: lets you send C-Space to the terminal itself if needed (press prefix twice)
bind C-Space send-prefix

##### RELOAD CONFIG #####
# r: after prefix, press r to reload tmux config without restarting tmux
# display-message: shows a confirmation message at the bottom
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### SPLITS #####
# NOTE: default bindings " (horizontal) and % (vertical) are kept — these are extras
# s: prefix+s splits pane horizontally (like :sp in vim)
# v: prefix+v splits pane vertically (like :vsp in vim)
# -c "#{pane_current_path}": new pane opens in same directory as current pane
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# c: new window opens in same directory as current pane (overrides default which opens in home)
bind c new-window -c "#{pane_current_path}"

##### PANE NAVIGATION #####
# prefix+hjkl to move between panes — same direction as vim
# vim-tmux-navigator plugin (below) also adds Ctrl+hjkl without needing prefix at all
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -r means REPEATABLE — press prefix once, then keep pressing HJKL to keep resizing
# without -r, you'd need prefix every single time
# H/J/K/L (uppercase) resizes panes in steps of 5
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOW NAVIGATION #####
# Tab/Shift-Tab chosen specifically to avoid vim conflicts
# p=paste, n=next-search, []=motions in vim — all conflict if used here
# -r makes these repeatable: prefix then keep pressing Tab to cycle through windows
bind -r Tab  next-window
bind -r BTab previous-window

##### COPY MODE #####
# copy mode = tmux's "visual mode" — lets you scroll up and select text
# prefix+v enters copy mode (like pressing v to start visual in vim)
# prefix+[ also enters copy mode (tmux default — kept intentionally)
bind-key v copy-mode

# -T means TABLE — specifies which mode/context the key works in
# copy-mode-vi = inside copy mode with vim keys active
# without -T, the key would apply to normal prefix mode instead
# think of tables like vim modes: same key does different things in different contexts

# v: start character selection (like v in vim visual mode)
bind-key -T copy-mode-vi v send -X begin-selection
# V: start line selection (like V in vim)
bind-key -T copy-mode-vi V send -X select-line
# C-v: rectangle/block selection (like Ctrl+v in vim visual block mode)
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# y: yank (copy) selection — does NOT jump to bottom of terminal
# normally tmux jumps to bottom after copy, "copy-selection" without "-and-cancel" prevents that
bind-key -T copy-mode-vi y send -X copy-selection
# Enter: copy and EXIT copy mode (when you're done and want to leave)
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

# q/Escape: exit copy mode without copying (like Escape in vim)
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi q      send -X cancel

# Line navigation — same as vim
# 0: start of line, ^: first non-blank, $: end of line
bind-key -T copy-mode-vi 0 send -X start-of-line
bind-key -T copy-mode-vi ^ send -X back-to-indentation
bind-key -T copy-mode-vi $ send -X end-of-line

# Word navigation — same as vim
# w: next word start, b: previous word start, e: next word end
bind-key -T copy-mode-vi w send -X next-word
bind-key -T copy-mode-vi b send -X previous-word
bind-key -T copy-mode-vi e send -X next-word-end

##### SELECTION COLOR #####
# mode-style: color of selected text in copy mode
# changed from default purple to yellow (bg=#f1fa8c) so selection is clearly visible
# fg=#282a36 is dark background color (Dracula theme background)
set -g mode-style "bg=#f1fa8c,fg=#282a36"
set -g message-style "bg=#282a36,fg=#f8f8f2"

##### SYSTEM CLIPBOARD (macOS) #####
# set-clipboard on: allows tmux to write to system clipboard
# reattach-to-user-namespace: macOS fix — without this, pbcopy/pbpaste don't work inside tmux
set -g set-clipboard on
set-option -g default-command "reattach-to-user-namespace -l $SHELL"

##### TPM — TMUX PLUGIN MANAGER #####
# TPM works like vim-plug — add plugins here, press prefix+I to install
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

##### VIM-TMUX NAVIGATOR #####
# This plugin makes Ctrl+hjkl work seamlessly between vim splits AND tmux panes
# Without this: Ctrl+h inside vim would try to navigate tmux instead of vim splits
# IMPORTANT: you must also add this plugin to your nvim config for it to work
# nvim side (lazy.nvim): { "christoomey/vim-tmux-navigator" }
set -g @plugin 'christoomey/vim-tmux-navigator'

##### FZF INTEGRATION #####
# Fuzzy finder inside tmux
# prefix+F: search sessions, windows, panes, commands interactively
set -g @plugin 'sainnhe/tmux-fzf'

##### QUALITY OF LIFE PLUGINS #####
# tmux-pain-control: adds more pane management bindings
# tmux-yank: improves clipboard integration (works with system clipboard automatically)
# tmux-open: prefix+o to open selected file/url from copy mode
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

##### DRACULA THEME #####
set -g @plugin 'dracula/tmux'
set -g @dracula-uptime-colors "green dark_gray"
set -g @dracula-battery-label false
set -g @dracula-show-battery-status true
set -g @dracula-show-timezone false
set -g @dracula-uptime-label "󱎫"
set -g @dracula-plugins "battery uptime cpu-usage ram-usage time"
set -g @dracula-show-ssh-only-when-connected true
set -g @dracula-show-ssh-session-port true
set -g @dracula-show-empty-plugins true

##### INITIALIZE TPM (MUST BE LAST LINE) #####
# This line boots up TPM and loads all plugins listed above
# Like "call plug#end()" in vim-plug
run '~/.tmux/plugins/tpm/tpm'
